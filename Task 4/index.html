<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upcoming Online Events Check-In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main id="app"></main>

  <div id="qrModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2>Event Check-In</h2>
      <p id="modalEventName" class="event-name"></p>
      <p id="modalEventMeta" class="event-meta"></p>
      <div class="qr-frame">
        <img id="qrImage" class="qr-image" src="./Qr%20code.png" alt="Event QR Code" />
      </div>
      <p id="scanHint" class="scan-hint"></p>
      <button id="closeModalBtn" class="btn secondary">Close</button>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
